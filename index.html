<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Наша история</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#08131d,#0f2c28);
font-family:Georgia,serif;
color:white;
overflow:hidden;
}


body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:rgba(255,255,255,.05);
filter:blur(120px);
border-radius:50%;
animation:move 8s ease-in-out infinite alternate;
}


@keyframes move{
from{
transform:translate(-150px,-120px);
}

to{
transform:translate(180px,120px);
}
}


.hero{
position:relative;
z-index:2;
text-align:center;
padding:40px;
}


.small{
font-size:64px;
font-weight:300;
letter-spacing:1px;
color:white;
line-height:1.4;
animation:fade 2.5s ease;
}


@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}
}


.slide{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}


#slide2{
display:none;
}


#slide2 video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}


.text{
position:absolute;
bottom:80px;
max-width:800px;
padding:20px;
font-size:32px;
line-height:1.5;
text-align:center;
color:white;
}</style>

</head>


<body>

<div class="slide" id="slide1">

<p class="small">
Для частички моей души
</p>

</div>


<div class="slide" id="slide2">

<video autoplay muted playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="text">
Тогда, 7 лет назад, сидя рядом с тобой, я ещё не знала,
что ты станешь самым дорогим и близким человеком в моей жизни
</div>

</div>


</body>

</html>
