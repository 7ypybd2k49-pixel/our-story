
<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Наша история</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(180deg,#08131d,#0f2c28);

font-family:Georgia,serif;

color:white;

overflow:hidden;

}


body::before{

content:"";

position:absolute;

width:600px;
height:600px;

background:rgba(255,255,255,.05);

filter:blur(120px);

border-radius:50%;

animation:move 8s ease-in-out infinite alternate;

}



@keyframes move{

from{
transform:translate(-150px,-120px);
}

to{
transform:translate(180px,120px);
}

}



.slide{

position:absolute;

top:0;
left:0;

width:100vw;
height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

}



.first-content{

display:flex;

flex-direction:column;

align-items:center;

}



.small{

font-size:64px;

font-weight:300;

letter-spacing:1px;

line-height:1.4;

max-width:700px;

animation:fade 2.5s ease;

}



@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}



button{

margin-top:35px;

padding:15px 35px;

border-radius:50px;

background:transparent;

border:1px solid #d7c38b;

color:white;

font-size:18px;

cursor:pointer;

}



.video-slide{

display:none;

}



.video-slide video{

position:absolute;

width:100%;

height:100%;

object-fit:cover;

}



.text{

position:absolute;

bottom:80px;

max-width:800px;

padding:20px;

font-size:32px;

line-height:1.5;

}



@media(max-width:600px){


.small{

font-size:30px;

line-height:1.5;

max-width:85vw;

}


button{

font-size:16px;

padding:14px 30px;

margin-top:25px;

}


.text{

font-size:22px;

bottom:40px;

padding:20px;

}


}



</style>

</head>


<body>



<!-- ПЕРВЫЙ СЛАЙД -->

<div class="slide" id="first">


<div class="first-content">


<p class="small">

Для частички<br>
моей души

</p>



<button onclick="nextSlide()">

Открыть нашу историю

</button>


</div>


</div>




<!-- ВТОРОЙ СЛАЙД -->

<div class="slide video-slide" id="second">


<video autoplay muted playsinline controls>

<source src="video.mp4" type="video/mp4">

</video>



<div class="text">

Тогда, 7 лет назад, сидя рядом с тобой, я ещё не знала,
что ты станешь самым дорогим и близким человеком в моей жизни

</div>


</div>




<script>


function nextSlide(){

document.getElementById("first").style.display="none";

document.getElementById("second").style.display="flex";

}


</script>



</body>

</html>
