<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Наша история</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

background:linear-gradient(180deg,#08131d,#0f2c28);

font-family:Georgia,serif;

color:white;

overflow:hidden;

}


.slide{

position:absolute;

top:0;
left:0;

width:100vw;
height:100vh;

display:none;

justify-content:center;

align-items:center;

text-align:center;

padding:30px;

}



.active{

display:flex;

}



.content{

max-width:900px;

animation:fade 2s ease;

}



.title{

font-size:64px;

font-weight:300;

line-height:1.4;

}



.text{

font-size:32px;

line-height:1.6;

max-width:850px;

}



button{

margin-top:40px;

padding:15px 35px;

border-radius:50px;

background:transparent;

border:1px solid #d7c38b;

color:white;

font-size:18px;

}



img{

max-width:90%;

max-height:70vh;

object-fit:cover;

}



.video{

position:absolute;

width:100%;

height:100%;

object-fit:cover;

z-index:1;

}



.overlay-text{

position:absolute;

z-index:2;

bottom:60px;

width:90%;

font-size:32px;

line-height:1.5;

}



.gallery{

display:flex;

gap:15px;

flex-wrap:wrap;

justify-content:center;

}



.gallery img{

width:30%;

height:250px;

border-radius:10px;

}



@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}



@media(max-width:600px){

.title{

font-size:34px;

}


.text{

font-size:21px;

}


.overlay-text{

font-size:21px;

bottom:35px;

}


.gallery img{

width:45%;

height:160px;

}

}


</style>

</head>


<body>


<!-- СЛАЙД 1 -->

<div class="slide active" id="slide1">

<div class="content">

<div class="title">

Для частички<br>
моей души

</div>


<button onclick="next(2)">

Открыть нашу историю

</button>


</div>

</div>



<!-- СЛАЙД 2 -->


<div class="slide" id="slide2">


<video class="video" autoplay muted playsinline>

<source src="video.mp4" type="video/mp4">

</video>


<div class="overlay-text">

Тогда, 7 лет назад, сидя рядом с тобой, я ещё не знала,
что ты станешь самым дорогим и близким человеком в моей жизни

</div>


</div>



<!-- СЛАЙД 3 -->


<div class="slide" id="slide3">


<div class="content">


<div class="gallery">


<img src="photo1.jpg">

<img src="photo2.jpg">

<img src="photo3.jpg">


</div>


<div class="text">

Наша история началась так удивительно и я безумно рада что она продолжается

</div>


</div>


</div>
