
<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Наша история</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(180deg,#08131d,#0f2c28);
font-family:Georgia,serif;
color:white;
}


/* СЛАЙДЫ */

.slide{
position:absolute;
top:0;
left:0;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}


/* ПЕРВЫЙ СЛАЙД */

#slide1{
display:flex;
}


.content{
padding:30px;
}


.title{
font-size:64px;
font-weight:300;
line-height:1.4;
}


button{
margin-top:40px;
padding:16px 40px;
border-radius:50px;
background:transparent;
border:1px solid #d7c38b;
color:white;
font-size:18px;
}


/* ВТОРОЙ СЛАЙД */

#slide2{
display:none;
background:black;
}


video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}


.text{
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:800px;
font-size:30px;
line-height:1.5;
z-index:2;
}


/* ТЕЛЕФОН */

@media(max-width:600px){

.title{
font-size:34px;
}

.text{
font-size:21px;
bottom:35px;
}

button{
font-size:16px;
padding:14px 30px;
}

}

</style>

</head>


<body>


<!-- ПЕРВЫЙ СЛАЙД -->

<div class="slide" id="slide1">

<div class="content">

<div class="title">

Для частички<br>
моей души

</div>


<button onclick="openSecond()">

Открыть нашу историю

</button>


</div>

</div>



<!-- ВТОРОЙ СЛАЙД -->

<div class="slide" id="slide2">


<video autoplay muted playsinline controls>

<source src="video.mp4" type="video/mp4">

</video>


<div class="text">

Тогда, 7 лет назад, сидя рядом с тобой, я ещё не знала, что ты станешь самым дорогим и близким человеком в моей жизни

</div>


</div>



<script>

function openSecond(){

document.getElementById("slide1").style.display="none";

document.getElementById("slide2").style.display="flex";

}

</script>


</body>
</html>
