<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Наша история</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(180deg,#08131d,#0f2c28);

font-family:Georgia,serif;

color:white;

overflow:hidden;

}

body::before{

content:"";

position:absolute;

width:600px;

height:600px;

background:rgba(255,255,255,.05);

filter:blur(120px);

border-radius:50%;

animation:move 8s ease-in-out infinite alternate;

}

@keyframes move{

from{

transform:translate(-150px,-120px);

}

to{

transform:translate(180px,120px);

}

}

.hero{

position:relative;

z-index:2;

text-align:center;

max-width:700px;

padding:40px;

}

.small{

letter-spacing:6px;

text-transform:uppercase;

font-size:13px;

color:#d7c38b;

margin-bottom:25px;

}

h1{

font-size:72px;

font-weight:400;

margin-bottom:25px;

}

.subtitle{

font-size:24px;

line-height:1.8;

opacity:.85;

margin-bottom:55px;

}

button{

padding:18px 45px;

border-radius:50px;

background:transparent;

border:1px solid #d7c38b;

color:white;

font-size:18px;

cursor:pointer;

transition:.4s;

}

button:hover{

background:#d7c38b;

color:#08131d;

}

</style>

</head>

<body>

<div class="hero">

<p class="small">

для частички моей души 


</p>

<h1>

Наша история

</h1>

<p class="subtitle">

365 дней.

Сотни воспоминаний.

И только одно чувство —

я бы снова выбрала тебя.

</p>

<button>

Открыть нашу историю

</button>

</div>

</body>

</html>
