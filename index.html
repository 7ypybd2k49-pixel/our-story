<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Наша история</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
margin:0;
background:#08131d;
font-family:Georgia,serif;
overflow:hidden;
color:white;
}

.slide{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(180deg,#08131d,#0f2c28);
}

#slide1{
display:flex;
}

.page{
width:100%;
max-width:430px;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

h1{
font-size:46px;
font-weight:300;
line-height:1.4;
margin-bottom:45px;
}

button{
padding:16px 34px;
font-size:18px;
border:none;
border-radius:50px;
background:#d7c38b;
color:#08131d;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

video{
width:100%;
border-radius:22px;
background:black;
box-shadow:0 10px 35px rgba(0,0,0,.35);
}

.text{
margin-top:30px;
font-size:22px;
line-height:1.6;
}

@media(max-width:430px){

h1{
font-size:34px;
}

.text{
font-size:19px;
}

button{
font-size:16px;
}

}

.story-title{
font-size:32px;
line-height:1.4;
font-weight:300;
margin-bottom:35px;
}

.photo-grid{
width:100%;
display:flex;
flex-direction:column;
gap:15px;
}

.photo-grid > img{
width:75%;
align-self:center;
border-radius:22px;
object-fit:contain;
background:#08131d;
}

.small-photos{
display:flex;
gap:15px;
width:100%;
}

.small-photos img{
width:50%;
border-radius:22px;
aspect-ratio:1/1;
object-fit:cover;
}

.story-text{
font-size:22px;
line-height:1.5;
margin-top:30px;
}

@media(max-width:430px){

.story-title{
font-size:26px;
}

.story-text{
font-size:19px;
}

}</style>

</head>

<body>

<div class="slide" id="slide1">

<div class="page">

<h1>
Для частички<br>моей души
</h1>

<h1>
Для частички<br>моей души
</h1>

</div>

</div>

<div class="slide" id="slide2">

<div class="page">

<video id="video" autoplay muted playsinline>

<source src="video.mp4.MP4" type="video/mp4">

</video>

<div class="text">

Тогда, 7 лет назад, сидя рядом с тобой, я ещё не знала, что ты станешь самым дорогим и близким человеком в моей жизни.

</div>

</div>

</div>

<script>

setTimeout(function(){

document.getElementById("slide1").style.display="none";
document.getElementById("slide2").style.display="flex";

document.getElementById("video").play();

},3000);

}const video = document.getElementById("video");

video.onended = function(){

document.getElementById("slide2").style.display="none";
document.getElementById("slide3").style.display="flex";

}

</script>

</body><!-- ТРЕТИЙ СЛАЙД -->

<div class="slide" id="slide3">

<div class="page">

<div class="story-title">
Наша история<br>
началась так удивительно…
</div>

<div class="photo-grid">

<img src="photo1.jpg.JPG">

<div class="small-photos">

<img src="photo2.jpg.JPG">

<img src="photo3.jpg.JPG">

</div>

</div>

<div class="story-text">
И я безумно рада,<br>
что она продолжается 🤍
</div>

</div>

</div>

</div>

</div>
</html>
